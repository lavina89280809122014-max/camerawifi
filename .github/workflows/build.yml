name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
      ANDROID_SDK_ROOT: ${{ runner.temp }}/android-sdk
      ANDROID_HOME: ${{ runner.temp }}/android-sdk
      JAVA_HOME: /usr/lib/jvm/java-11-openjdk-amd64

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            openjdk-11-jdk-headless wget unzip zip git build-essential \
            libssl-dev libffi-dev python3-dev libjpeg-dev zlib1g-dev

      - name: Install Android commandline tools
        run: |
          mkdir -p "${ANDROID_SDK_ROOT}/cmdline-tools"
          cd /tmp
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip
          mkdir -p "${ANDROID_SDK_ROOT}/cmdline-tools/latest"
          mv cmdline-tools/* "${ANDROID_SDK_ROOT}/cmdline-tools/latest/"
          rm -rf /tmp/cmdline-tools.zip /tmp/cmdline-tools

      - name: Install SDK packages and accept licenses
        run: |
          export PATH="${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin:${ANDROID_SDK_ROOT}/platform-tools:${PATH}"
          yes | sdkmanager --sdk_root="${ANDROID_SDK_ROOT}" --licenses || true
          sdkmanager --sdk_root="${ANDROID_SDK_ROOT}" "platform-tools" "platforms;android-31" "build-tools;37.0.0" "ndk;23.1.7779620" "cmake;3.10.2.4988404"

      - name: Ensure buildozer spec (optional)
        run: |
          if [ -f buildozer_client.spec ]; then cp buildozer_client.spec buildozer.spec; fi
          ls -la

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install cython buildozer

      - name: Build APK with Buildozer
        working-directory: ${{ github.workspace }}
        run: |
          export ANDROID_SDK_ROOT="${ANDROID_SDK_ROOT}"
          export ANDROID_HOME="${ANDROID_HOME}"
          export JAVA_HOME="${JAVA_HOME}"
          # point NDK to installed side-by-side path if present
          export ANDROID_NDK_HOME="$(ls -d ${ANDROID_SDK_ROOT}/ndk/* 2>/dev/null | tail -n1 || true)"
          export PATH="${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin:${ANDROID_SDK_ROOT}/platform-tools:${PATH}"
          buildozer -v android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: camerawifi-apk
          path: bin/*.apk
          retention-days: 30
