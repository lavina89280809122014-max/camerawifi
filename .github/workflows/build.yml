name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y openjdk-11-jdk-headless wget unzip zip git build-essential libssl-dev libffi-dev python3-dev libjpeg-dev zlib1g-dev

      - name: Install Android commandline tools
        run: |
          ANDROID_SDK_ROOT="$HOME/Android/Sdk"
          mkdir -p "${ANDROID_SDK_ROOT}/cmdline-tools"
          cd /tmp
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip
          mkdir -p "${ANDROID_SDK_ROOT}/cmdline-tools/latest"
          mv cmdline-tools/* "${ANDROID_SDK_ROOT}/cmdline-tools/latest/"
          rm -rf /tmp/cmdline-tools.zip /tmp/cmdline-tools

      - name: Update PATH, accept licenses and install SDK packages
        run: |
          export ANDROID_SDK_ROOT="$HOME/Android/Sdk"
          export PATH="${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin:${ANDROID_SDK_ROOT}/platform-tools:${PATH}"
          yes | sdkmanager --sdk_root="${ANDROID_SDK_ROOT}" --licenses || true
          sdkmanager --sdk_root="${ANDROID_SDK_ROOT}" "platform-tools" "platforms;android-31" "build-tools;31.0.0" "ndk;23.1.7779620" "cmake;3.10.2.4988404"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install buildozer cython

      - name: Build APK with Buildozer
        working-directory: ${{ github.workspace }}
        run: |
          export ANDROID_SDK_ROOT="$HOME/Android/Sdk"
          export JAVA_HOME="/usr/lib/jvm/java-11-openjdk-amd64"
          export PATH="${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin:${ANDROID_SDK_ROOT}/platform-tools:${PATH}"
          buildozer -v android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: camerawifi-apk
          path: bin/*.apk
          retention-days: 30
